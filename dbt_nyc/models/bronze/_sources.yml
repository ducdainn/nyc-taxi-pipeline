version: 2

sources:
  - name: bronze
    description: "Raw TLC Yellow Taxi data loaded by bronze_loader.py into DuckDB"
    schema: bronze
    tables:
      - name: yellow_trips
        description: "Yellow taxi trip records with metadata columns"
        columns:
          - name: VendorID
            description: "TPEP provider code"
          - name: tpep_pickup_datetime
            description: "Pickup timestamp"
          - name: tpep_dropoff_datetime
            description: "Dropoff timestamp"
          - name: passenger_count
            description: "Number of passengers"
          - name: trip_distance
            description: "Trip distance in miles"
          - name: RatecodeID
            description: "Rate code"
          - name: store_and_fwd_flag
            description: "Store and forward flag"
          - name: PULocationID
            description: "Pickup location zone ID"
          - name: DOLocationID
            description: "Dropoff location zone ID"
          - name: payment_type
            description: "Payment type code"
          - name: fare_amount
            description: "Fare amount"
          - name: extra
            description: "Extra charges"
          - name: mta_tax
            description: "MTA tax"
          - name: tip_amount
            description: "Tip amount"
          - name: tolls_amount
            description: "Tolls amount"
          - name: improvement_surcharge
            description: "Improvement surcharge"
          - name: total_amount
            description: "Total amount"
          - name: congestion_surcharge
            description: "Congestion surcharge"
          - name: Airport_fee
            description: "Airport fee"
          - name: _ingested_at
            description: "Ingestion timestamp (metadata)"
          - name: _source_file
            description: "Source file name (metadata)"
          - name: _year
            description: "Year partition key (metadata)"
          - name: _month
            description: "Month partition key (metadata)"
