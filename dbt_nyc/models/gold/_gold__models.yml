version: 2

models:
  - name: fact_trips
    description: "Fact table for yellow taxi trips (incremental)"
    columns:
      - name: trip_id
        description: "Surrogate key"
        tests:
          - not_null
      - name: pickup_location_id
        description: "Pickup TLC zone ID"
        tests:
          - not_null
          - relationships:
              to: ref('dim_zones')
              field: zone_id
      - name: dropoff_location_id
        description: "Dropoff TLC zone ID"
        tests:
          - not_null
          - relationships:
              to: ref('dim_zones')
              field: zone_id
      - name: pickup_datetime
        description: "Pickup timestamp"
        tests:
          - not_null
      - name: total_amount
        description: "Total trip amount"
        tests:
          - not_null
      - name: payment_type
        description: "Payment type code"
        tests:
          - accepted_values:
              values: [0, 1, 2, 3, 4, 5, 6]

  - name: dim_zones
    description: "Dimension table for TLC taxi zones"
    columns:
      - name: zone_id
        description: "TLC zone ID"
        tests:
          - unique
          - not_null
      - name: borough
        description: "NYC borough name"
        tests:
          - not_null
      - name: zone_name
        description: "Zone name"
        tests:
          - not_null

  - name: dim_datetime
    description: "Date/time dimension table"
    columns:
      - name: datetime_hour
        description: "Datetime at hour granularity"
        tests:
          - unique
          - not_null




